name: .NET

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore StatePocket.slnx

      - name: Build
        run: dotnet build StatePocket.slnx --no-restore

      - name: Test
        run: dotnet test StatePocket.slnx --no-build --verbosity normal
