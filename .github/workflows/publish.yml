name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Validate publish version
        shell: bash
        run: |
          set -euo pipefail

          version="$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' Directory.Build.props | head -n 1)"
          if [[ -z "$version" ]]; then
            echo "VersionPrefix was not found in Directory.Build.props."
            exit 1
          fi

          case "${{ github.event_name }}" in
            push)
              expected_tag="v$version"
              if [[ "${GITHUB_REF_NAME}" != "$expected_tag" ]]; then
                echo "Tag '${GITHUB_REF_NAME}' does not match VersionPrefix '$version'."
                exit 1
              fi
              ;;
            workflow_dispatch)
              if [[ "$version" != *-* ]]; then
                echo "workflow_dispatch is allowed only for prerelease versions. Current VersionPrefix: '$version'."
                exit 1
              fi
              ;;
            *)
              echo "Unsupported event '${{ github.event_name }}'."
              exit 1
              ;;
          esac

      - name: Restore dependencies
        run: dotnet restore StatePocket.slnx

      - name: Build
        run: dotnet build StatePocket.slnx --no-restore -c Release

      - name: Test
        run: dotnet test StatePocket.slnx --no-build -c Release --verbosity normal

      - name: Pack
        run: dotnet pack StatePocket/StatePocket.csproj -c Release

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push packages to nuget.org
        run: dotnet nuget push "StatePocket/bin/Release/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
